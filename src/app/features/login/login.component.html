<div class="login-card">
  <div class="brand-badge">
    <i class="fas fa-shield-alt"></i> PLATAFORMA OFICIAL
  </div>

  <h1 class="title">AzuayCare</h1>
  <p class="subtitle">Acceso seguro para estudiantes y personal del Tec Azuay</p>

  <!-- ALERTA DE ERROR -->
  @if (error()) {
    <div class="error-alert">
      <i class="fas fa-exclamation-circle"></i>
      <span>{{ error() }}</span>
    </div>
  }

  <!-- SPINNER ANIMADO DE CARGA (DOT SPINNER) -->
  @if (isLoading()) {
    <div class="spinner-container">
      <div class="dot-spinner">
        <div class="dot-spinner__dot"></div>
        <div class="dot-spinner__dot"></div>
        <div class="dot-spinner__dot"></div>
        <div class="dot-spinner__dot"></div>
        <div class="dot-spinner__dot"></div>
        <div class="dot-spinner__dot"></div>
        <div class="dot-spinner__dot"></div>
        <div class="dot-spinner__dot"></div>
      </div>
      <span style="font-size: 0.9rem; font-weight: 600; color: #15803d;">Verificando credenciales...</span>
    </div>
  }

  <!-- BOTÓN DE GOOGLE -->
  <div class="google-btn-wrapper" [style.display]="isLoading() ? 'none' : 'flex'">
    <div id="googleBtn"></div>
  </div>
</div>
