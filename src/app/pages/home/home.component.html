<div class="home-container" style="padding: 2rem; font-family: sans-serif; max-width: 600px; margin: 0 auto;">
  <h1 style="color: #15803d; font-weight: 800; letter-spacing: -0.03em;">Bienvenido a AzuayCare</h1>
  
  <div style="border: 1px solid #e2e8f0; padding: 1.5rem; border-radius: 12px; background-color: #f8fafc; margin-top: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
    <p style="margin: 0 0 0.75rem 0; font-size: 1.1rem; color: #1e293b;">
      Hola, <strong style="color: #0f172a;">{{ auth.user()?.nombre }}</strong> 👋
    </p>
    <p style="margin: 0 0 0.75rem 0; color: #475569;">
      <strong>Correo:</strong> {{ auth.user()?.email }}
    </p>
    <p style="margin: 0; color: #475569;">
      <strong>Rol asignado:</strong> 
      <span style="background-color: #dcfce7; color: #15803d; padding: 0.25rem 0.6rem; border-radius: 6px; font-weight: bold; font-size: 0.85rem; margin-left: 0.25rem;">
        {{ auth.user()?.rol }}
      </span>
    </p>
  </div>

  <button (click)="logout()" style="margin-top: 2rem; padding: 0.75rem 1.5rem; background-color: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; width: 100%;">
    Cerrar Sesión
  </button>
</div>
